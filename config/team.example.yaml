team:
  name: example-team

  tailnet:
    # DNS label this Teem node presents on the tailnet.
    hostname: teem-leader
    # Environment variable Teem reads the tailnet auth key from. If unset
    # or empty, tsnet falls back to interactive login (URL printed to
    # stderr on first run).
    auth_key_env: TS_AUTHKEY

  leader:
    system_prompt: |
      You are leading a small team. Delegate implementation work to a
      worker; run every change past a reviewer before declaring it
      done. Spawn as many workers and reviewers as you need up to the
      caps. Keep messages concise.
    mcps: []

  # Archetypes are role templates. The leader chooses how many to spawn
  # of each, up to max_concurrent. Auto-generated instance ids are
  # worker-1, worker-2, … (never reused).
  archetypes:
    - role: worker
      description: "Implements features and fixes — runs in its own git worktree."
      placement: local
      max_concurrent: 5

    - role: reviewer
      description: "Independent reviewer. Reads diffs, flags risk."
      placement: local
      max_concurrent: 3
